<!-- Fondo espacial -->
<div class="min-h-screen bg-black text-yellow-400 px-6 py-10" 
     style="background: radial-gradient(ellipse at top, #0a0a2e 0%, #000000 70%);
            background-image: radial-gradient(ellipse at top, #0a0a2e 0%, #000000 70%),
            url('https://www.transparenttextures.com/patterns/stardust.png');">

  <!-- Título principal -->
  <div class="text-center mb-2">
    <h1 class="text-6xl font-extrabold tracking-widest text-yellow-400 uppercase drop-shadow-lg"
        style="font-family: 'Georgia', serif;
               text-shadow: 0 0 20px #facc15, 0 0 40px #ca8a04, 0 0 80px #92400e;
               letter-spacing: 0.3em;">
      STAR WARS
    </h1>
    <p class="text-sm tracking-[0.5em] text-yellow-600 uppercase mt-2 mb-10">
      — Saga Cinematográfica —
    </p>

    <!-- Línea decorativa -->
    <div class="flex items-center justify-center gap-4 mb-10">
      <div class="h-px w-32 bg-gradient-to-r from-transparent to-yellow-500"></div>
      <span class="text-yellow-500 text-xl">✦</span>
      <div class="h-px w-32 bg-gradient-to-l from-transparent to-yellow-500"></div>
    </div>
  </div>

  <!-- Grid de cards -->
  <div class="flex flex-wrap gap-6 justify-center">

    <div *ngFor="let s of series"
         class="w-72 rounded-lg overflow-hidden border border-yellow-700 hover:border-yellow-400 transition-all duration-300 hover:scale-105 hover:shadow-2xl"
         style="background: linear-gradient(160deg, #0f0f1a, #1a1a0f);
                box-shadow: 0 0 15px rgba(250,204,21,0.1);
                transition: box-shadow 0.3s ease, transform 0.3s ease;"
         onmouseover="this.style.boxShadow='0 0 30px rgba(250,204,21,0.35)'"
         onmouseout="this.style.boxShadow='0 0 15px rgba(250,204,21,0.1)'">

      <!-- Imagen -->
      <div class="relative">
        <img class="w-full h-72 object-cover object-top"
             [src]="getSeriesImages(s.episode_id)"
             [alt]="s.title"
             (error)="onImgError($event)">
        <!-- Overlay degradado -->
        <div class="absolute bottom-0 left-0 right-0 h-16"
             style="background: linear-gradient(to top, #0f0f1a, transparent);"></div>
        <!-- Badge episodio -->
        <span class="absolute top-3 right-3 bg-yellow-400 text-black text-xs font-bold px-2 py-1 rounded"
              style="letter-spacing: 0.1em;">
          EP. {{ s.episode_id }}
        </span>
      </div>

      <!-- Contenido -->
      <div class="px-5 py-4">
        <h2 class="text-yellow-400 font-bold text-lg uppercase tracking-widest mb-2"
            style="text-shadow: 0 0 10px rgba(250,204,21,0.4);">
          {{ s.title }}
        </h2>
        <p class="text-gray-400 text-xs leading-relaxed line-clamp-4 mb-4">
          {{ s.opening_crawl }}
        </p>
      </div>

      <!-- Tags -->
      <div class="px-5 pb-5 flex flex-wrap gap-2">
        <span class="text-xs px-3 py-1 rounded-full border border-yellow-700 text-yellow-500"
              style="background: rgba(250,204,21,0.05);">
          🎬 {{ s.director }}
        </span>
        <span class="text-xs px-3 py-1 rounded-full border border-yellow-700 text-yellow-500"
              style="background: rgba(250,204,21,0.05);">
          📅 {{ s.release_date }}
        </span>
      </div>

    </div>
  </div>

</div>
